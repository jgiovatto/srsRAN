__template.file.506=pcf.yaml
__template.file.507=pcrf.yaml
__template.file.508=scp.yaml
__template.file.509=sgwc.yaml
__template.file.510=sgwu.yaml
__template.file.511=smf.yaml
__template.file.512=upf.yaml
__template.file.513=mongodb.conf
__template.file.514=mbms.conf


[!open5gs-5g-container:container]
@uplane_ip_addr=10.99.1.102
@cplane_ip_addr=10.99.1.101

# open5gs control plane container
