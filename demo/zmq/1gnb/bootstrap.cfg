# see templates dir for default config items
#
# 1 gnb, 1 ue all on 1 channel


# common to the ue(s) in this experiment
[!ue-common:ue-container]
@dev_name=zmq
@mbms_service=0
@ue_all_log_level=info
@ue_mac_log_level=info
@num_eutra_carriers=0
@num_rat_carriers=1
@dl_earfcn=0
@ue_release=15


# common to the gnb(s) in this experiment
[!gnb-common:gnb-container]
__template.file.101=gnb.yaml


## create the ue containers here
[ue-01:ue-common]
@id=1
@dev_args=tx_port0=tcp://*:2001,rx_port0=tcp://10.99.1.20:2000,id=ue,base_rate=23.04e6


# create the gnb container here
[gnb:gnb-container]
@id=20
@dev_args=tx_port=tcp://*:2000,rx_port=tcp://10.99.1.1:2001,base_srate=23.04e6
@amf_ip_addr=10.99.1.101

# create the epc/mbms container here
[open5gs-epc:open5gs-container]
@id=101
@tun_device_addr=172.16.0.101/24
@tun_device_name=ogstun
@free_diameter_dir=/home/jgiovatto/Devel/open5gs/install/etc/freeDiameter
@open5gs_log_level=info
# mme endpoint
@mme_ip_addr=10.99.1.101
# amf listen addr
@amf_bind_addr=10.99.1.101
