# see templates dir for default config items
#
# 1 gnb, 1 ue all on 1 channel


# common to the ue(s) in this experiment
[!ue-common:ue-container]
@dev_name=zmq
@mbms_service=0
@ue_all_log_level=info
@ue_mac_log_level=info
@num_eutra_carriers=0
@num_rat_carriers=1
@dl_earfcn=0
@ue_release=15


## create the ue containers here
#[ue-01:ue-common]
#@id=1


# create the gnb container here
[gnb:gnb-split_6-container]
@id=20
@amf_ip_addr=10.99.1.101

# create the epc/mbms container here
[open5gs-cplane:open5gs-5g-ctrl-container]
@id=101
@free_diameter_dir=/home/jgiovatto/Devel/open5gs/install/etc/freeDiameter
@open5gs_log_level=info


[open5gs-uplane:open5gs-5g-user-container]
@id=102
@tun_device_addr=172.16.0.101/24
@tun_device_name=ogstun
@free_diameter_dir=/home/jgiovatto/Devel/open5gs/install/etc/freeDiameter
@open5gs_log_level=info
